sonar.projectKey=ahmed-145_ACR-QA
sonar.organization=ahmed-145
sonar.projectName=ACR-QA
sonar.projectVersion=5.0.0rc2

sonar.sources=.
sonar.tests=TESTS
sonar.python.version=3.11

sonar.exclusions=\
  **/__pycache__/**,\
  **/*.pyc,\
  .venv/**,\
  dashboard/**,\
  FRONTEND/**,\
  DATABASE/**,\
  vscode-extension/**,\
  acrqa-action/**,\
  TESTS/**,\
  scripts/**,\
  alembic/**,\
  docs/**,\
  ACR-QA-Book/**,\
  DATA/**,\
  TOOLS/**,\
  build/**,\
  dist/**,\
  htmlcov/**,\
  mutants/**,\
  notebooks/**,\
  test_targets/**,\
  cloudflare-pages/**,\
  config/**,\
  deploy/**

sonar.test.inclusions=TESTS/**
sonar.test.exclusions=\
  TESTS/fixtures/**,\
  TESTS/samples/**,\
  TESTS/evaluation/**,\
  TESTS/load/**,\
  TESTS/e2e/**,\
  TESTS/snapshot/**

sonar.python.coverage.reportPaths=coverage.xml
sonar.coverage.exclusions=\
  TESTS/**,\
  scripts/**,\
  alembic/**

sonar.sourceEncoding=UTF-8
sonar.scm.provider=git
