[mutmut]
paths_to_mutate =
    CORE/engines/confidence_scorer.py
    CORE/engines/quality_gate.py
    CORE/engines/severity_scorer.py
tests_dir = TESTS
also_copy =
    TESTS
    CORE
    DATABASE
    FRONTEND
    scripts
    config
    alembic
    TOOLS
    DATA
    .env.example
    .acrqa.yml
pytest_add_cli_args =
    --override-ini=addopts=
    -m
    not integration and not slow
    --ignore=TESTS/samples
    --ignore=TESTS/e2e
    --ignore=TESTS/load
    --ignore=TESTS/evaluation
    --ignore=TESTS/test_live_smoke.py
    --ignore=TESTS/test_dogfood.py
    --ignore=TESTS/test_recall.py
    --ignore=TESTS/test_no_custom_rules.py
    --ignore=TESTS/test_attestation.py
    --ignore=TESTS/test_god_mode.py
    --ignore=TESTS/test_mcp_server.py
    --ignore=TESTS/test_explainer.py
    --ignore=TESTS/test_offline_mode.py
