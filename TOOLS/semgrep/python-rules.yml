rules:
  # ============================================================
  # SECURITY RULES
  # ============================================================

  - id: dangerous-eval-usage
    pattern-either:
      - pattern: eval($X)
      - pattern: exec($X)
      - pattern: builtins.eval(...)
      - pattern: __builtins__.eval(...)
      - pattern: __builtins__['eval'](...)
      - pattern: getattr(__builtins__, 'eval')(...)
    message: |
      Dangerous use of eval() or exec(). These functions execute arbitrary
      Python code and should NEVER be used with user input.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      canonical_rule_id: SECURITY-001

  - id: sql-injection-string-concat
    pattern-either:
      - pattern: $CURSOR.execute("..." + $VAR + "...")
      - pattern: $CURSOR.execute(f"...{$VAR}...")
      - pattern: $CURSOR.execute("..." % $VAR)
      - pattern: $CURSOR.execute("...%s..." % $ARGS)
    message: |
      Possible SQL injection vulnerability. Use parameterized queries instead.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      canonical_rule_id: SECURITY-027


  - id: unsafe-pickle
    pattern-either:
      - pattern: pickle.loads($X)
      - pattern: pickle.load($X)
    message: |
      Pickle can deserialize arbitrary objects. Never use with untrusted data!
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      canonical_rule_id: SECURITY-008

  - id: shell-injection
    pattern-either:
      - pattern: subprocess.run($CMD, shell=True, ...)
      - pattern: subprocess.call($CMD, shell=True, ...)
      - pattern: subprocess.Popen($CMD, shell=True, ...)
      - pattern: os.system($CMD)
    message: |
      Shell injection risk! shell=True with user input allows command injection.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      canonical_rule_id: SECURITY-021

  - id: hardcoded-password
    pattern-either:
      - pattern: password = "..."
      - pattern: PASSWORD = "..."
      - pattern: DB_PASSWORD = "..."
      - pattern: db_password = "..."
      - pattern: secret = "..."
      - pattern: SECRET = "..."
      - pattern: SECRET_KEY = "..."
      - pattern: secret_key = "..."
      - pattern: api_key = "..."
      - pattern: API_KEY = "..."
      - pattern: API_TOKEN = "..."
      - pattern: api_token = "..."
      - pattern: token = "..."
      - pattern: TOKEN = "..."
      - pattern: auth_token = "..."
      - pattern: AUTH_TOKEN = "..."
    message: |
      Hardcoded secret detected! Use environment variables instead.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      canonical_rule_id: HARDCODE-001


  - id: path-traversal
    pattern-either:
      - pattern: open($PATH + $USER_INPUT, ...)
      - pattern: open(f"...{$USER_INPUT}...", ...)
    message: |
      Potential path traversal vulnerability. Validate path before use.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      canonical_rule_id: PATH-001

  - id: yaml-load-unsafe
    pattern-either:
      - pattern: yaml.load($X)
      - pattern: yaml.load(stream=$X)
    message: |
      yaml.load() without a Loader is unsafe and can execute arbitrary code.
      Use yaml.safe_load() or yaml.load($X, Loader=yaml.SafeLoader) instead.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      cwe: CWE-502
      canonical_rule_id: SECURITY-018



  - id: flask-xss-render-string
    pattern-either:
      - pattern: flask.render_template_string($TEMPLATE, ...)
      - pattern: render_template_string($TEMPLATE, ...)
    message: |
      render_template_string() with user-controlled input is vulnerable to XSS
      (Cross-Site Scripting). An attacker can inject malicious HTML/JS into
      the rendered page.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      cwe: CWE-79
      canonical_rule_id: SECURITY-045

  - id: ssrf-requests-user-url
    pattern-either:
      - pattern: requests.get($URL, ...)
      - pattern: requests.post($URL, ...)
      - pattern: requests.request($METHOD, $URL, ...)
      - pattern: urllib.request.urlopen($URL)
    message: |
      Potential SSRF (Server-Side Request Forgery). If $URL is user-controlled,
      an attacker may reach internal services, metadata endpoints, or localhost.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      cwe: CWE-918
      canonical_rule_id: SECURITY-046

  - id: jwt-none-algorithm
    pattern-either:
      - pattern: jwt.decode($TOKEN, ..., algorithms=["none"], ...)
      - pattern: jwt.decode($TOKEN, ..., algorithms=["HS256", "none"], ...)
    message: |
      JWT decoded with 'none' algorithm. This allows signature bypass — an
      attacker can forge tokens without a secret key.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      cwe: CWE-347
      canonical_rule_id: SECURITY-047

  - id: aiohttp-debug-enabled
    pattern: Application(..., debug=True, ...)
    message: "aiohttp Application started with debug=True. This exposes internal error details and enables debug middleware. Set debug=False or remove the debug parameter in production."
    languages:
      - python
    severity: WARNING
    metadata:
      cwe: CWE-215
      owasp: A05:2021
      category: security
      canonical_rule_id: SECURITY-065

  - id: aiohttp-jinja2-autoescape-false
    patterns:
      - pattern: aiohttp_jinja2.setup(..., autoescape=False, ...)
    message: "Disabling autoescape in aiohttp_jinja2 allows Cross-Site Scripting (XSS). User input rendered in templates will not be HTML-escaped. Remove autoescape=False or set it to True."
    languages:
      - python
    severity: WARNING
    metadata:
      cwe: CWE-79
      owasp: A03:2021
      category: security
      canonical_rule_id: SECURITY-045

  - id: lxml-xxe

    pattern-either:
      - pattern: lxml.etree.parse($INPUT)
      - pattern: etree.fromstring($INPUT)
      - pattern: etree.parse($INPUT)
    message: |
      lxml parses XML with external entity resolution enabled by default.
      This allows XXE (XML External Entity) attacks. Use resolve_entities=False.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      cwe: CWE-611
      canonical_rule_id: SECURITY-044

  - id: open-redirect
    pattern-either:
      - pattern: redirect(request.args.get(...))
      - pattern: redirect(request.form.get(...))
      - pattern: redirect(request.values.get(...))
    message: |
      Open redirect vulnerability. User-controlled redirect destination can
      redirect users to malicious sites (phishing, credential harvesting).
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      cwe: CWE-601
      canonical_rule_id: SECURITY-048

  # ============================================================
  # BEST PRACTICE RULES
  # ============================================================

  - id: mutable-default-argument
    pattern-either:
      - pattern: |
          def $FUNC(..., $ARG=[], ...):
            ...
      - pattern: |
          def $FUNC(..., $ARG={}, ...):
            ...
    message: |
      Mutable default argument detected! This is a classic Python bug.
      Default values are created ONCE when the function is defined.
    severity: ERROR
    languages: [python]
    metadata:
      category: best-practice
      canonical_rule_id: PATTERN-001

  - id: bare-except
    pattern: |
      try:
        ...
      except:
        ...
    message: |
      Bare except catches everything including KeyboardInterrupt and SystemExit.
      Use 'except Exception:' instead.
    severity: WARNING
    languages: [python]
    metadata:
      category: best-practice
      canonical_rule_id: EXCEPT-001

  - id: open-without-context-manager
    pattern: |
      $F = open($PATH, ...)
    message: |
      File opened without context manager. Use 'with open(...) as f:' instead.
    severity: WARNING
    languages: [python]
    metadata:
      category: best-practice
      canonical_rule_id: RESOURCE-001

  - id: assert-for-validation
    pattern: |
      assert $COND, $MSG
    message: |
      Assert statements are removed with -O flag. Don't use for input validation.
    severity: WARNING
    languages: [python]
    paths:
      exclude:
        - "TESTS/**"
        - "tests/**"
        - "test_*.py"
        - "*_test.py"
        - "conftest.py"
        - "pytest/**"
    metadata:
      category: security
      canonical_rule_id: ASSERT-001


  - id: print-in-production
    pattern: print(...)
    message: |
      Print statements in production code. Use logging module instead.
    severity: INFO
    languages: [python]
    metadata:
      category: style
      canonical_rule_id: PRINT-001

  # ============================================================
  # DESIGN RULES
  # ============================================================

  - id: too-many-parameters
    pattern: |
      def $FUNC($A1, $A2, $A3, $A4, $A5, $A6, $A7, ...):
        ...
    message: |
      Function has too many parameters (>6). Consider using a config object.
    severity: WARNING
    languages: [python]
    metadata:
      category: design
      canonical_rule_id: SOLID-001

  - id: global-variable
    pattern: |
      global $VAR
      $VAR = ...
    message: |
      Modifying global variables creates hidden dependencies. Avoid globals.
    severity: WARNING
    languages: [python]
    metadata:
      category: design
      canonical_rule_id: GLOBAL-001

  # ============================================================
  # TAINT-BASED RULES — v7 detection expansion (2026-06-02)
  # Targets previously-missed CWE classes: CWE-601, CWE-117,
  # CWE-090, CWE-730, CWE-079, CWE-347
  # ============================================================

  - id: acrqa-open-redirect
    mode: taint
    pattern-sources:
      - pattern: request.args
      - pattern: request.args.get(...)
      - pattern: request.args[...]
      - pattern: request.GET
      - pattern: request.GET.get(...)
      - pattern: request.GET[...]
    pattern-sinks:
      - pattern: redirect(...)
      - pattern: HttpResponseRedirect(...)
    message: "Open redirect: user-controlled URL flows to redirect (CWE-601)."
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      canonical_rule_id: SECURITY-048
      cwe: CWE-601

  - id: acrqa-open-redirect-header
    mode: taint
    pattern-sources:
      - pattern: request.args
      - pattern: request.args.get(...)
      - pattern: request.args[...]
      - pattern: request.GET.get(...)
    pattern-sinks:
      - pattern: $RESP.headers['Location'] = ...
      - pattern: $RESP['Location'] = ...
    message: "Open redirect via Location header (CWE-601)."
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      canonical_rule_id: SECURITY-048
      cwe: CWE-601

  - id: acrqa-log-injection
    mode: taint
    pattern-sources:
      - pattern: request.args
      - pattern: request.args.get(...)
      - pattern: request.args[...]
      - pattern: request.GET.get(...)
      - pattern: input(...)
    pattern-sinks:
      - pattern: logging.debug(...)
      - pattern: logging.info(...)
      - pattern: logging.warning(...)
      - pattern: logging.error(...)
      - pattern: logging.critical(...)
      - pattern: $LOGGER.debug(...)
      - pattern: $LOGGER.info(...)
      - pattern: $LOGGER.warning(...)
      - pattern: $LOGGER.error(...)
      - pattern: $LOGGER.critical(...)
    message: "Log injection: unsanitized user input written to logs (CWE-117)."
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      canonical_rule_id: SECURITY-066
      cwe: CWE-117

  - id: acrqa-ldap-injection
    mode: taint
    pattern-sources:
      - pattern: request.args
      - pattern: request.args.get(...)
      - pattern: request.args[...]
      - pattern: request.GET.get(...)
    pattern-sinks:
      - pattern: $CONN.search_s(...)
      - pattern: $CONN.search(...)
      - pattern: $CONN.search_ext_s(...)
      - pattern: ldap.search(...)
    message: "LDAP injection: user input flows into an LDAP query (CWE-90)."
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      canonical_rule_id: SECURITY-067
      cwe: CWE-90

  - id: acrqa-redos-user-pattern
    mode: taint
    pattern-sources:
      - pattern: request.args
      - pattern: request.args.get(...)
      - pattern: request.args[...]
      - pattern: request.GET.get(...)
    pattern-sinks:
      - pattern: re.search($PAT, ...)
      - pattern: re.match($PAT, ...)
      - pattern: re.compile(...)
      - pattern: re.findall($PAT, ...)
      - pattern: re.fullmatch($PAT, ...)
    message: "ReDoS: user-controlled regex pattern can cause catastrophic backtracking (CWE-730)."
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      canonical_rule_id: SECURITY-051
      cwe: CWE-730

  - id: acrqa-reflective-xss
    mode: taint
    pattern-sources:
      - pattern: request.args
      - pattern: request.args.get(...)
      - pattern: request.args[...]
      - pattern: request.GET.get(...)
    pattern-sinks:
      - pattern: make_response(...)
    message: "Reflected XSS: user input returned in response without escaping (CWE-79)."
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      canonical_rule_id: SECURITY-045
      cwe: CWE-79

  - id: acrqa-jwt-signature-bypass
    pattern-either:
      - pattern: jwt.decode($T, verify=False)
      - pattern: jwt.process_jwt(...)
      - pattern-regex: 'jwt\.decode\([^)]*verify_signature.*False'
    message: "JWT signature verification disabled — tokens can be forged (CWE-347)."
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      canonical_rule_id: SECURITY-047
      cwe: CWE-347

  # ============================================================
  # v7 GAP-CLOSING RULES — second pass (2026-06-03)
  # Targets remaining missed CWE classes to push recall to ~90%:
  # CWE-113, CWE-209, CWE-295, CWE-319, CWE-321, CWE-327,
  # CWE-521, CWE-760, CWE-835, CWE-943, CWE-022 (more patterns)
  # ============================================================

  - id: acrqa-http-response-splitting
    mode: taint
    pattern-sources:
      - pattern: request.args
      - pattern: request.args.get(...)
      - pattern: request.args[...]
    pattern-sinks:
      - pattern: $HEADERS.add($KEY, ...)
      - pattern: $RESP.headers[$KEY] = ...
      - pattern: $RESP.headers.add($KEY, ...)
    message: "HTTP response splitting: user input in response header (CWE-113)."
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      canonical_rule_id: SECURITY-068
      cwe: CWE-113

  - id: acrqa-traceback-exposure
    pattern-either:
      - pattern: return traceback.format_exc()
      - pattern: return traceback.format_tb(...)
      - pattern: $R.data = traceback.format_exc()
    message: "Information exposure via traceback — reveals stack frames to clients (CWE-209)."
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      canonical_rule_id: SECURITY-069
      cwe: CWE-209

  - id: acrqa-empty-db-password
    pattern-either:
      - patterns:
          - pattern: $X['PASSWORD'] = $EMPTY
          - metavariable-comparison:
              metavariable: $EMPTY
              comparison: $EMPTY == ""
      - patterns:
          - pattern: $X['password'] = $EMPTY
          - metavariable-comparison:
              metavariable: $EMPTY
              comparison: $EMPTY == ""
    message: "Empty database password in configuration (CWE-521)."
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      canonical_rule_id: SECURITY-070
      cwe: CWE-521

  - id: acrqa-empty-db-uri-password
    pattern-regex: '(postgresql|mysql|mssql|oracle)://[^:@]*:@'
    message: "Database URI contains empty password (CWE-521)."
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      canonical_rule_id: SECURITY-070
      cwe: CWE-521

  - id: acrqa-hardcoded-salt
    pattern-either:
      - pattern: pbkdf2_hmac($ALG, $PWD, b'...', ...)
      - pattern: hashlib.pbkdf2_hmac($ALG, $PWD, b'...', ...)
    message: "Hard-coded salt in password hash — makes hashes predictable (CWE-760)."
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      canonical_rule_id: SECURITY-071
      cwe: CWE-760

  - id: acrqa-loop-no-increment
    patterns:
      - pattern: |
          while $I < $N:
            $BODY
      - pattern-not: |
          while $I < $N:
            ...
            $I = ...
            ...
      - pattern-not: |
          while $I < $N:
            ...
            $I += ...
            ...
    message: "Loop condition variable never incremented — possible infinite loop (CWE-835)."
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      canonical_rule_id: SECURITY-072
      cwe: CWE-835

  - id: acrqa-nosql-injection-dynamo
    pattern-either:
      - pattern: |
          $CLIENT.scan(FilterExpression=$A + $B, ...)
      - pattern: |
          $CLIENT.query(KeyConditionExpression=$A + $B, ...)
    message: "NoSQL injection: user input concatenated into DynamoDB expression (CWE-943)."
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      canonical_rule_id: SECURITY-073
      cwe: CWE-943

  - id: acrqa-openssl-no-verify
    pattern-either:
      - pattern: SSL.Context(SSL.TLSv1_2_METHOD)
      - pattern: SSL.Context(SSL.TLSv1_METHOD)
      - pattern: SSL.Context(SSL.SSLv3_METHOD)
      - pattern: SSL.Context(SSL.SSLv23_METHOD)
    message: "OpenSSL context created without certificate verification (CWE-295)."
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      canonical_rule_id: SECURITY-013
      cwe: CWE-295

  - id: acrqa-ftp-cleartext
    pattern-either:
      - pattern: ftplib.FTP(...)
      - pattern: $FTP.login(...)
    message: "FTP transmits credentials and data in cleartext (CWE-319)."
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      canonical_rule_id: SECURITY-074
      cwe: CWE-319

  - id: acrqa-hardcoded-apikey-assignment
    pattern-either:
      - pattern: $OBJ.api_key = "..."
      - pattern: openai.api_key = "..."
    message: "Hard-coded API key in source — load from environment instead (CWE-321)."
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      canonical_rule_id: SECURITY-005
      cwe: CWE-321

  - id: acrqa-ssl-wrap-socket
    pattern: ssl.wrap_socket(...)
    message: "ssl.wrap_socket() is deprecated and insecure — use ssl.create_default_context() (CWE-327)."
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      canonical_rule_id: SECURITY-014
      cwe: CWE-327

  - id: acrqa-sha256-password-no-hmac
    patterns:
      - pattern: hashlib.sha256($PWD + $SALT).hexdigest()
      - pattern-not: hashlib.sha256($X, usedforsecurity=False)
    message: "Plain SHA-256 is not suitable for password hashing — use bcrypt/argon2 (CWE-327)."
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      canonical_rule_id: SECURITY-009
      cwe: CWE-327

  - id: acrqa-os-system-fstring
    mode: taint
    pattern-sources:
      - pattern: request.args
      - pattern: request.args.get(...)
      - pattern: request.args[...]
    pattern-sinks:
      - pattern: os.system(...)
    message: "Command injection via os.system with user input (CWE-078/CWE-116)."
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      canonical_rule_id: SECURITY-021
      cwe: CWE-116

  - id: acrqa-path-traversal-osremove
    mode: taint
    pattern-sources:
      - pattern: request.args
      - pattern: request.args.get(...)
      - pattern: request.args[...]
    pattern-sinks:
      - pattern: os.remove(...)
      - pattern: os.unlink(...)
      - pattern: urllib.request.urlopen(...)
    message: "Path traversal: user input in file operation (CWE-022)."
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      canonical_rule_id: SECURITY-049
      cwe: CWE-022

  - id: acrqa-dynamic-exec
    pattern-either:
      - pattern: exec($X + $Y)
      - pattern: exec($X.format(...))
    message: "Dynamic exec() with string concatenation — code injection risk (CWE-094)."
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      canonical_rule_id: SECURITY-001
      cwe: CWE-094
