# .pre-commit-config.yaml
# Runs automatically on every `git commit` to block bad commits.
# Install once with: .venv/bin/pre-commit install
# Run manually on all files: .venv/bin/pre-commit run --all-files

repos:
  # Standard file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^deploy/helm/
      - id: check-json
      - id: check-merge-conflict
      - id: debug-statements        # catches leftover breakpoint() / pdb.set_trace()
      - id: check-added-large-files
        args: ['--maxkb=700']

  # Ruff — format check + lint (must match what we run manually)
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: .venv/bin/ruff format --check
        language: system
        types: [python]
        args: [CORE/, DATABASE/, FRONTEND/, TESTS/, scripts/]
        pass_filenames: false

      - id: ruff-lint
        name: ruff lint
        entry: .venv/bin/ruff check
        language: system
        types: [python]
        args: [CORE/, DATABASE/, FRONTEND/, TESTS/, scripts/]
        pass_filenames: false

  # mypy — type checking on CORE/ only (where we have annotations)
  - repo: local
    hooks:
      - id: mypy
        name: mypy type check
        entry: .venv/bin/mypy
        language: system
        types: [python]
        args: [CORE/, --ignore-missing-imports, --no-error-summary]
        pass_filenames: false

  # pytest — fast smoke test (no coverage, just pass/fail)
  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest (smoke test)
        # ACRQA_DEEP_SCAN=0 keeps this smoke hook fast now that deep-scan is default-on (it runs the
        # full pipeline across many orchestrator tests). The deep-scan path is covered by the full
        # suite and dedicated tests; the smoke hook's job is fast regression-catching on every commit.
        entry: env ACRQA_DEEP_SCAN=0 .venv/bin/pytest
        language: system
        args: [TESTS/, -q, --tb=short, -x, --no-header, --no-cov,
               -m, "not slow and not exploit and not smoke and not e2e",
               --ignore=TESTS/e2e]

        pass_filenames: false
        stages: [pre-commit]
