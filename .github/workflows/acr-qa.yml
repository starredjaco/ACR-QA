# =============================================================================
# ACR-QA — Code Review Product Workflow
# =============================================================================
# PURPOSE: Analyzes Pull Request diffs, posts AI-powered review comments,
#          and enforces quality gates.
# TRIGGERS:
#   - Auto: Every PR (opened, updated, reopened)
#   - Manual: Comment "acr-qa review" on any PR
# =============================================================================

name: ACR-QA Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  security-events: write

jobs:
  # ─── Job 1: Auto-trigger on PR events ─────────────────────────────────
  analyze-pr:
    name: Analyze Pull Request
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request'

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: acrqa_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup ACR-QA environment
        uses: ./.github/actions/acr-qa-setup
        with:
          db-name: acrqa_test
          db-password: postgres

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          files: |
            **/*.py
            **/*.js
            **/*.ts
            **/*.go

      - name: Run ACR-QA Analysis
        if: steps.changed-files.outputs.any_changed == 'true'
        id: analysis
        continue-on-error: true
        env:
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          GROQ_API_KEY_4: ${{ secrets.GROQ_API_KEY_4 }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: acrqa_test
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: |
          set -o pipefail
          mkdir -p /tmp/pr-files
          echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ' ' '\n' > /tmp/changed_files.txt
          while IFS= read -r file; do
            if [ -f "$file" ]; then
              mkdir -p "/tmp/pr-files/$(dirname "$file")"
              cp "$file" "/tmp/pr-files/$file"
            fi
          done < /tmp/changed_files.txt
          python3 CORE/main.py \
            --target-dir /tmp/pr-files \
            --repo-name "${{ github.repository }}" \
            --pr-number ${{ github.event.pull_request.number }} \
            --limit 100 | tee /tmp/analysis_output.txt
          grep "Run ID:" /tmp/analysis_output.txt | awk '{print $NF}' > /tmp/acr_run_id.txt

      - name: Upload SARIF findings to Security Tab
        if: steps.changed-files.outputs.any_changed == 'true' && hashFiles('DATA/outputs/findings.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: DATA/outputs/findings.sarif

      - name: Post PR Comments
        if: steps.changed-files.outputs.any_changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: acrqa_test
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: |
          python3 scripts/post_pr_comments.py \
            --repo "${{ github.repository }}" \
            --pr-number ${{ github.event.pull_request.number }} \
            --run-id-file /tmp/acr_run_id.txt

      - name: Create Autofix PR
        if: steps.changed-files.outputs.any_changed == 'true' && steps.analysis.outcome != 'cancelled'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: acrqa_test
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: |
          RUN_ID=$(cat /tmp/acr_run_id.txt 2>/dev/null || echo "")
          if [ -z "$RUN_ID" ]; then
            echo "No run ID found — skipping autofix PR"
            exit 0
          fi
          python3 scripts/create_fix_pr.py \
            --run-id "$RUN_ID" \
            --repo "${{ github.repository }}" \
            --base-branch "${{ github.event.pull_request.base.ref }}" \
            || echo "Autofix PR skipped (no validated fixes or PR already exists)"

      - name: Post Quality Gate Summary
        if: steps.changed-files.outputs.any_changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: acrqa_test
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: |
          python3 scripts/post_gate_comment.py \
            --repo "${{ github.repository }}" \
            --pr-number ${{ github.event.pull_request.number }} \
            --run-id-file /tmp/acr_run_id.txt

      - name: Enforce Quality Gate
        if: steps.analysis.outcome == 'failure'
        run: |
          python3 -c "
          import yaml, sys, os
          cfg = yaml.safe_load(open('.acrqa.yml')) if os.path.exists('.acrqa.yml') else {}
          mode = cfg.get('quality_gate', {}).get('mode', 'block')
          print(f'Gate mode: {mode}')
          sys.exit(0 if mode == 'warn' else 1)
          "

  # ─── Job 2: Manual trigger via "acr-qa review" comment ────────────────
  manual-trigger:
    name: Manual Review (comment trigger)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, 'acr-qa review')

    permissions:
      contents: read
      pull-requests: write
      issues: write
      security-events: write

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: acrqa_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: React to comment (eyes)
        uses: peter-evans/create-or-update-comment@v3
        with:
          comment-id: ${{ github.event.comment.id }}
          reactions: 'eyes'

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head

      - name: Setup ACR-QA environment
        uses: ./.github/actions/acr-qa-setup
        with:
          db-name: acrqa_test
          db-password: postgres

      - name: Run ACR-QA Analysis (Full Scan)
        id: analysis
        continue-on-error: true
        env:
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          GROQ_API_KEY_4: ${{ secrets.GROQ_API_KEY_4 }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: acrqa_test
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: |
          set -o pipefail
          python3 CORE/main.py \
            --target-dir . \
            --repo-name "${{ github.repository }}" \
            --pr-number ${{ github.event.issue.number }} \
            --limit 100 | tee /tmp/analysis_output.txt
          grep "Run ID:" /tmp/analysis_output.txt | awk '{print $NF}' > /tmp/acr_run_id.txt

      - name: Upload SARIF findings to Security Tab
        if: hashFiles('DATA/outputs/findings.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: DATA/outputs/findings.sarif

      - name: Post PR Comments
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: acrqa_test
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: |
          python3 scripts/post_pr_comments.py \
            --repo "${{ github.repository }}" \
            --pr-number ${{ github.event.issue.number }} \
            --run-id-file /tmp/acr_run_id.txt

      - name: Create Autofix PR
        if: steps.analysis.outcome != 'cancelled'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: acrqa_test
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: |
          RUN_ID=$(cat /tmp/acr_run_id.txt 2>/dev/null || echo "")
          if [ -z "$RUN_ID" ]; then
            echo "No run ID found — skipping autofix PR"
            exit 0
          fi
          python3 scripts/create_fix_pr.py \
            --run-id "$RUN_ID" \
            --repo "${{ github.repository }}" \
            --base-branch "main" \
            || echo "Autofix PR skipped"

      - name: Post Quality Gate Summary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: acrqa_test
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: |
          python3 scripts/post_gate_comment.py \
            --repo "${{ github.repository }}" \
            --pr-number ${{ github.event.issue.number }} \
            --run-id-file /tmp/acr_run_id.txt

      - name: Enforce Quality Gate
        if: steps.analysis.outcome == 'failure'
        run: |
          python3 -c "
          import yaml, sys, os
          cfg = yaml.safe_load(open('.acrqa.yml')) if os.path.exists('.acrqa.yml') else {}
          mode = cfg.get('quality_gate', {}).get('mode', 'block')
          print(f'Gate mode: {mode}')
          sys.exit(0 if mode == 'warn' else 1)
          "

      - name: React to completion
        if: always()
        uses: peter-evans/create-or-update-comment@v3
        with:
          comment-id: ${{ github.event.comment.id }}
          reactions: 'rocket'
