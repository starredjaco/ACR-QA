# =============================================================================
# ACR-QA — Production Health Gate
# =============================================================================
# Railway auto-deploys on every push to main via its GitHub integration.
# This workflow just waits for the production URL to become healthy after
# each push, acting as a deployment smoke-test gate.
# Requires: RAILWAY_PRODUCTION_URL secret set in repo Settings → Secrets.
# =============================================================================

name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest

    steps:
      - name: Wait for Railway health check
        run: |
          URL="https://acrqa-api-production.up.railway.app/health"
          echo "Waiting for Railway deployment to become healthy..."
          sleep 30
          for i in $(seq 1 30); do
            STATUS=$(curl -sf "$URL" -o /dev/null -w "%{http_code}" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Deployment healthy (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/30 — status $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Health check timed out after ~5 minutes"
          exit 1
