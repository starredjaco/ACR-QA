# =============================================================================
# ACR-QA — Internal Test & Lint CI
# =============================================================================
# PURPOSE: Tests ACR-QA's own codebase (pytest + ruff) on every push/PR.
#          This is for DEVELOPING ACR-QA — not for analyzing user code.
#          For the product workflow (PR analysis), see acr-qa.yml.
# =============================================================================

name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: acrqa_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Initialize database
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d acrqa_test -f DATABASE/schema.sql || {
            echo "❌ Database initialization failed"
            exit 1
          }

      - name: Run tests with coverage
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: acrqa_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
        run: |
          pytest TESTS/ -v --override-ini="addopts=" --tb=short \
            --cov=CORE --cov=DATABASE --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --junitxml=test-results.xml 2>&1

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml

      - name: Post coverage summary
        if: always()
        run: |
          if [ -f coverage.xml ]; then
            echo "### 📊 Test Coverage" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          rate = float(root.attrib.get('line-rate', 0)) * 100
          print(f'**Overall: {rate:.1f}%**')
          print()
          print('| Module | Coverage |')
          print('|--------|:--------:|')
          for pkg in root.findall('.//package'):
              name = pkg.attrib.get('name', '?')
              lr = float(pkg.attrib.get('line-rate', 0)) * 100
              print(f'| {name} | {lr:.1f}% |')
          " >> $GITHUB_STEP_SUMMARY
          fi

  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Ruff
        run: pip install ruff==0.6.0

      - name: Check formatting
        run: ruff format --check CORE/ DATABASE/ scripts/ FRONTEND/ TESTS/

      - name: Check linting
        run: ruff check CORE/ DATABASE/ scripts/ FRONTEND/ TESTS/
