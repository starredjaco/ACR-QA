# =============================================================================
# ACR-QA — Internal Test & Lint CI
# =============================================================================
# PURPOSE: Tests ACR-QA's own codebase (pytest + ruff) on every push/PR.
#          This is for DEVELOPING ACR-QA — not for analyzing user code.
#          For the product workflow (PR analysis), see acr-qa.yml.
# =============================================================================

name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: acrqa_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run database migrations
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: acrqa_test
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: |
          alembic upgrade head || {
            echo "❌ Alembic migration failed"
            exit 1
          }

      - name: Run tests with coverage
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: acrqa_test
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: |
          pytest TESTS/ -v --override-ini="addopts=" --tb=short \
            --cov=. --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            --cov-report=term-missing \
            --ignore=TESTS/e2e \
            -m "not slow and not exploit and not smoke" \
            --junitxml=test-results.xml 2>&1

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@a99c28d3f0da835de33ff2feb2e15691c7b9641f # v7
        if: always()
        with:
          files: coverage.xml
          flags: unittests
          name: acrqa-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml

      - name: Post coverage summary
        if: always()
        run: |
          if [ -f coverage.xml ]; then
            echo "### 📊 Test Coverage" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          rate = float(root.attrib.get('line-rate', 0)) * 100
          print(f'**Overall: {rate:.1f}%**')
          print()
          print('| Module | Coverage |')
          print('|--------|:--------:|')
          for pkg in root.findall('.//package'):
              name = pkg.attrib.get('name', '?')
              lr = float(pkg.attrib.get('line-rate', 0)) * 100
              print(f'| {name} | {lr:.1f}% |')
          " >> $GITHUB_STEP_SUMMARY
          fi

  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Ruff and mypy
        run: pip install ruff==0.6.0 mypy==1.11.0 types-PyYAML types-requests types-redis

      - name: Check formatting
        run: ruff format --check CORE/ DATABASE/ scripts/ FRONTEND/ TESTS/

      - name: Check linting
        run: ruff check CORE/ DATABASE/ scripts/ FRONTEND/ TESTS/

      - name: Type check
        run: mypy CORE/ DATABASE/ FRONTEND/
