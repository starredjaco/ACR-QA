name: Snyk Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  snyk:
    name: Snyk — SCA + SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Snyk CLI
        run: npm install -g snyk@latest

      - name: Snyk — dependency scan (SCA)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test \
            --file=requirements.txt \
            --severity-threshold=high \
            --json-file-output=snyk-sca.json || true

      - name: Snyk — code scan (SAST)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk code test \
            --severity-threshold=high \
            --json-file-output=snyk-sast.json || true

      - name: Upload Snyk results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: snyk-sast.json

      - name: Post Snyk summary to PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            function parseSummary(file) {
              if (!fs.existsSync(file)) return null;
              try {
                const d = JSON.parse(fs.readFileSync(file, 'utf8'));
                return d;
              } catch { return null; }
            }

            const sca  = parseSummary('snyk-sca.json');
            const sast = parseSummary('snyk-sast.json');

            const scaHigh  = sca?.vulnerabilities?.filter(v => v.severity === 'high' || v.severity === 'critical').length ?? 'N/A';
            const sastHigh = sast?.runs?.[0]?.results?.filter(r => r.level === 'error').length ?? 'N/A';

            const body = [
              '## 🔍 Snyk Security Report',
              '',
              '| Scan Type | HIGH / CRITICAL findings |',
              '|-----------|-------------------------|',
              `| SCA (dependencies) | ${scaHigh} |`,
              `| SAST (code) | ${sastHigh} |`,
              '',
              '> Full details: Actions → Snyk Security Scan → this run',
            ].join('\n');

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Upload Snyk JSON artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-results
          path: |
            snyk-sca.json
            snyk-sast.json
          retention-days: 30
