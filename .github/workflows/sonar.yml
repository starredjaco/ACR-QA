name: SonarCloud Analysis

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    # No postgres service — DB-dependent tests are skipped via -m "not integration".
    # The sonar scan only needs coverage.xml from unit tests.

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest-cov

      - name: Run tests with coverage (DB-less; integration tests auto-skip)
        run: |
          python -m pytest TESTS/ \
            --override-ini="addopts=" \
            --cov=CORE \
            --cov=acrqa-mcp \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=0 \
            -m "not slow and not exploit and not smoke and not integration" \
            --ignore=TESTS/e2e \
            -q || true
        continue-on-error: true

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=false
