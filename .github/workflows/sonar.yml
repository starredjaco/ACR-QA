name: SonarCloud Analysis

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    # No postgres service — tests use continue-on-error; sonar only needs coverage.xml
    # Removing the service avoids Docker Hub pulls that time out on some runners.

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest-cov

      - name: Run tests with coverage (DB-less; integration tests auto-skip)
        run: |
          python -m pytest TESTS/ -q \
            --cov=CORE \
            --cov-report=xml:coverage.xml \
            -m "not slow and not exploit and not smoke and not integration" \
            --ignore=TESTS/e2e \
            || true
        continue-on-error: true

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
