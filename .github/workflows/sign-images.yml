name: Build, sign, and attest (SLSA L3)

on:
  push:
    # Only build the production image on version tags (not every commit to main).
    # Docker Hub base image pulls are flaky on some runners; building on every
    # commit adds no value and blocks CI unnecessarily.
    tags: ["v*"]
  workflow_dispatch:  # allow manual trigger for testing

# SLSA L3 requires these exact permissions — do not reduce
permissions:
  contents: read
  packages: write
  id-token: write   # Sigstore/Fulcio keyless signing
  actions: read     # SLSA provenance generator needs this

jobs:
  # ── Job 1: build & push ──────────────────────────────────────────────────
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
    env:
      REGISTRY: ghcr.io
      IMAGE: ghcr.io/${{ github.repository_owner }}/acrqa

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          driver: docker

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Output digest for provenance
          outputs: type=image,name=${{ env.IMAGE }},push=true,push-by-digest=false

      - name: Sign image (keyless Cosign + Sigstore Rekor)
        uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9 # v3
      - run: |
          cosign sign --yes \
            "${{ env.IMAGE }}@${{ steps.build.outputs.digest }}"
        env:
          COSIGN_EXPERIMENTAL: "true"

      - name: Verify signature
        run: |
          cosign verify \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/sign-images.yml@${{ github.ref }}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ env.IMAGE }}@${{ steps.build.outputs.digest }}"
        env:
          COSIGN_EXPERIMENTAL: "true"

  # ── Job 2: SLSA L3 provenance ────────────────────────────────────────────
  provenance:
    name: Generate SLSA L3 provenance
    needs: [build]
    permissions:
      actions: read
      id-token: write
      packages: write
    # The official SLSA generator — runs in a separate, isolated job
    # (hermetic build requirement for L3)
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a # v2.1.0
    with:
      image: ghcr.io/${{ github.repository_owner }}/acrqa
      digest: ${{ needs.build.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}
