name: Build, sign, and attest (SLSA L3)

on:
  push:
    branches: [main]
    tags: ["v*"]

# SLSA L3 requires these exact permissions — do not reduce
permissions:
  contents: read
  packages: write
  id-token: write   # Sigstore/Fulcio keyless signing
  actions: read     # SLSA provenance generator needs this

jobs:
  # ── Job 1: build & push ──────────────────────────────────────────────────
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
    env:
      REGISTRY: ghcr.io
      IMAGE: ghcr.io/${{ github.repository_owner }}/acrqa

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Output digest for provenance
          outputs: type=image,name=${{ env.IMAGE }},push=true,push-by-digest=false

      - name: Sign image (keyless Cosign + Sigstore Rekor)
        uses: sigstore/cosign-installer@v3
      - run: |
          cosign sign --yes \
            "${{ env.IMAGE }}@${{ steps.build.outputs.digest }}"
        env:
          COSIGN_EXPERIMENTAL: "true"

      - name: Verify signature
        run: |
          cosign verify \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/sign-images.yml@${{ github.ref }}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ env.IMAGE }}@${{ steps.build.outputs.digest }}"
        env:
          COSIGN_EXPERIMENTAL: "true"

  # ── Job 2: SLSA L3 provenance ────────────────────────────────────────────
  provenance:
    name: Generate SLSA L3 provenance
    needs: [build]
    permissions:
      actions: read
      id-token: write
      packages: write
    # The official SLSA generator — runs in a separate, isolated job
    # (hermetic build requirement for L3)
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
    with:
      image: ghcr.io/${{ github.repository_owner }}/acrqa
      digest: ${{ needs.build.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}
