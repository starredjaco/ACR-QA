# Alembic configuration for ACR-QA
# See: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts
script_location = alembic

# Template for new migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for migration timestamps
timezone = UTC

# Maximum length for migration file slugs
truncate_slug_length = 40

# Version table in the database
version_table = alembic_version

# Database URL — read from environment at runtime (see alembic/env.py)
# Do NOT put credentials here. Use DATABASE_URL env var or individual DB_* vars.
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# No post-write hooks needed

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
