# Docker Compose for ACR-QA v2.0
# Starts: PostgreSQL, Redis, Flask App, Prometheus, Grafana

services:
  # ─── PostgreSQL Database ──────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: acr-qa-postgres
    environment:
      POSTGRES_DB: acrqa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./DATABASE/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d acrqa"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - acr-network

  # ─── Redis (Rate Limiting & Caching) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: acr-qa-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - acr-network

  # ─── ACR-QA Flask Application ────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acr-qa-app
    environment:
      DB_NAME: acrqa
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: postgres
      DB_PORT: 5432
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
      GROQ_API_KEY_1: ${GROQ_API_KEY_1}
      GROQ_API_KEY_2: ${GROQ_API_KEY_2:-}
      GROQ_API_KEY_3: ${GROQ_API_KEY_3:-}
      GROQ_API_KEY_4: ${GROQ_API_KEY_4:-}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITLAB_TOKEN: ${GITLAB_TOKEN:-}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-acr-qa-dev-secret}
    ports:
      - "5000:5000"
    volumes:
      - ./CORE:/app/CORE
      - ./DATABASE:/app/DATABASE
      - ./FRONTEND:/app/FRONTEND
      - ./TOOLS:/app/TOOLS
      - ./scripts:/app/scripts
      - ./config:/app/config
      - ./TESTS:/app/TESTS
      - ./DATA/outputs:/app/DATA/outputs
      - ./DATA/provenance:/app/DATA/provenance
      - ./DATA/reports:/app/DATA/reports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - acr-network
    stdin_open: true
    tty: true

  # ─── Prometheus (Metrics Scraping) ───────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: acr-qa-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - app
    networks:
      - acr-network
    restart: unless-stopped

  # ─── Grafana (Dashboards) ────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: acr-qa-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/acr-qa-dashboard.json
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - acr-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  acr-network:
    driver: bridge
