# bandit-test-cases — PyCQA/bandit official test corpus
# https://github.com/PyCQA/bandit
# The examples/ directory contains intentional vulnerability samples per rule.
# Paths verified against repo on 2026-05-14.
#
# Uses a tracked 4-file fixture set (TESTS/evaluation/fixtures/bandit-targeted/)
# instead of the full examples/ directory (100+ files). Scanning all 100+ files
# generates 8,501 normalized findings which exceed ACR-QA's 500-finding global cap,
# causing the 4 target findings to be evicted. The fixture files are identical
# copies of the originals (exec.py, crypto-md5.py, flask_debug.py,
# hardcoded-passwords.py) and are version-controlled in this repo.

repo: bandit-test-cases
url: https://github.com/PyCQA/bandit
language: python
local_path: TESTS/evaluation/fixtures/bandit-targeted

expected_findings:
  - id: bandit-exec-injection
    cwe: CWE-78
    canonical_id: SECURITY-001
    file: exec.py
    severity: high
    description: exec("do evil") — B102 exec used

  - id: bandit-weak-hash-md5
    cwe: CWE-328
    canonical_id: SECURITY-009
    file: crypto-md5.py
    severity: medium
    description: hashlib.md5 and Crypto.Hash.MD5 usage — B303/B324

  - id: bandit-flask-debug
    cwe: CWE-94
    canonical_id: SECURITY-065
    file: flask_debug.py
    severity: medium
    description: app.run(debug=True) — B201 flask debug enabled

  - id: bandit-hardcoded-password
    cwe: CWE-259
    canonical_id: SECURITY-005
    file: hardcoded-passwords.py
    severity: low
    description: password = "class_password" — B105 hardcoded password string

# ── Targets ──
# This corpus is designed to test Bandit exactly — recall should be near-perfect.
recall_target: 1.0   # 4/4 — all are canonical Bandit detections
precision_target: 0.60   # small corpus, expect low noise
