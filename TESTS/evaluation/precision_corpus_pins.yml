# Precision benchmark corpus — 30 mature, actively-maintained repos
# Pinned HEAD SHAs captured 2026-05-28 via `git ls-remote <url> HEAD`.
#
# Selection rules (fully objective, stated for defense reproducibility):
#   Python (20): Top-20 by PyPI 30-day downloads (hugovk.dev snapshot 2026-05-28),
#                excluding test/dev-only tools (pip, wheel) and meta-packages.
#   JS/TS  (6):  Top 6 by GitHub star count (Search API snapshot 2026-05-28),
#                filtered to recognizable installable libraries/frameworks.
#   Go     (4):  Top 4 by GitHub star count (Search API snapshot 2026-05-28),
#                filtered to recognizable installable libraries/apps.
#
# Precision measurement rationale:
#   These repos ship to millions of users and are under continuous security review.
#   Any HIGH/MEDIUM finding reported by ACR-QA is a candidate FP until triage
#   proves otherwise.  TP = confirmed real issue.  FP = noise / false positive.
#   Precision = TP / (TP + FP).
#
# Re-pin when intentionally re-running the benchmark.

