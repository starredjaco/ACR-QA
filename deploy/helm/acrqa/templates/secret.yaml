{{- if or .Values.api.env.DATABASE_URL .Values.api.env.REDIS_URL .Values.api.env.GROQ_API_KEY .Values.api.env.SECRET_KEY }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "acrqa.fullname" . }}-secrets
  labels:
    {{- include "acrqa.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: {{ .Values.api.env.DATABASE_URL | quote }}
  redis-url: {{ .Values.api.env.REDIS_URL | quote }}
  groq-api-key: {{ .Values.api.env.GROQ_API_KEY | quote }}
  secret-key: {{ .Values.api.env.SECRET_KEY | quote }}
{{- end }}
