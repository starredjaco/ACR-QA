apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "acrqa.fullname" . }}-api
  labels:
    {{- include "acrqa.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "acrqa.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "acrqa.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "acrqa.fullname" . }}-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "acrqa.fullname" . }}-secrets
                  key: redis-url
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "acrqa.fullname" . }}-secrets
                  key: groq-api-key
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "acrqa.fullname" . }}-secrets
                  key: secret-key
            - name: SENTRY_DSN
              value: {{ .Values.api.env.SENTRY_DSN | quote }}
          livenessProbe:
            {{- toYaml .Values.api.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.api.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "acrqa.fullname" . }}-worker
  labels:
    {{- include "acrqa.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "acrqa.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "acrqa.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: worker
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          command:
            - celery
            - -A
            - CORE.tasks
            - worker
            - --loglevel=info
            - --concurrency=4
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "acrqa.fullname" . }}-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "acrqa.fullname" . }}-secrets
                  key: redis-url
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "acrqa.fullname" . }}-secrets
                  key: groq-api-key
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
