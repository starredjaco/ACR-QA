{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "acrqa.fullname" . }}-api
  labels:
    {{- include "acrqa.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "acrqa.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- range .Values.networkPolicy.allowedNamespaces }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . }}
      ports:
        - protocol: TCP
          port: 8000
    {{- end }}
  egress:
    # Allow DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow outbound to PostgreSQL and Redis
    - ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
    # Allow outbound HTTPS (Groq API, Sentry)
    - ports:
        - protocol: TCP
          port: 443
{{- end }}
