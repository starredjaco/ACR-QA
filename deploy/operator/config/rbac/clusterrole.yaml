apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: acrqa-operator
rules:
  - apiGroups: ["acrqa.io"]
    resources: ["acrqascans", "acrqascans/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
