# ACR-QA Universal Rule Catalog
# Evidence-grounded definitions for RAG-enhanced explanations

SOLID-001:
  name: "Too Many Parameters"
  category: "design"
  severity: "medium"
  description: "Functions with more than 5 parameters violate Single Responsibility Principle"
  rationale: |
    Functions with many parameters are hard to test, understand, and maintain.
    Each parameter represents a dependency or responsibility. When a function
    needs many inputs, it's likely doing too much and should be split.
  remediation: "Extract related parameters into a dataclass or configuration object"
  example_good: |
    from dataclasses import dataclass
    
    @dataclass
    class UserConfig:
        username: str
        password: str
        email: str
    
    def create_user(config: UserConfig):
        print(f"Creating {config.username}")
  example_bad: |
    def create_user(username, password, email, phone, address, city, country):
        print(f"Creating {username}")  # Too many parameters!

IMPORT-001:
  name: "Unused Import"
  category: "style"
  severity: "low"
  description: "Import statement is never used in the file"
  rationale: |
    Unused imports clutter the namespace, slow down module loading,
    and confuse developers about what dependencies are actually needed.
  remediation: "Remove the import statement or use the imported module"
  example_good: |
    import os
    print(os.getcwd())  # os is used
  example_bad: |
    import os
    import sys  # Never used!
    print(os.getcwd())

VAR-001:
  name: "Unused Variable"
  category: "dead-code"
  severity: "low"
  description: "Variable is assigned but never referenced"
  rationale: |
    Unused variables indicate dead code, confuse readers about intent,
    and may hide bugs where the variable was meant to be used.
  remediation: "Remove the variable or use it in your code"
  example_good: |
    result = calculate_total()
    print(result)  # Variable is used
  example_bad: |
    result = calculate_total()
    unused_var = 42  # Never used!
    print(result)

SECURITY-001:
  name: "Dangerous eval() Usage"
  category: "security"
  severity: "high"
  description: "eval() executes arbitrary Python code and should never be used with user input"
  rationale: |
    eval() is a code execution vulnerability. An attacker can inject malicious
    code that will run with your application's privileges, leading to data theft,
    system compromise, or remote code execution.
  remediation: "Use ast.literal_eval() for safe evaluation of literals, or redesign to avoid dynamic evaluation"
  example_good: |
    import ast
    # Safe for literals only (strings, numbers, lists, dicts)
    data = ast.literal_eval(user_input)
  example_bad: |
    # DANGEROUS! User can execute arbitrary code
    result = eval(user_input)

PATTERN-001:
  name: "Mutable Default Argument"
  category: "best-practice"
  severity: "medium"
  description: "Using mutable objects (list, dict, set) as default function arguments"
  rationale: |
    Default arguments are created ONCE when the function is defined, not each
    time it's called. All calls share the same list/dict/set, causing unexpected
    behavior where changes persist across function calls.
  remediation: "Use None as default, then initialize the mutable object inside the function"
  example_good: |
    def add_item(item, items=None):
        if items is None:
            items = []
        items.append(item)
        return items
  example_bad: |
    def add_item(item, items=[]):  # BUG! All calls share same list
        items.append(item)
        return items

DUP-001:
  name: "Code Duplication"
  category: "duplication"
  severity: "medium"
  description: "Identical or nearly identical code blocks found in multiple locations"
  rationale: |
    Duplicated code violates the DRY (Don't Repeat Yourself) principle.
    When you need to fix a bug or add a feature, you must change it in
    multiple places, increasing the risk of inconsistencies and bugs.
  remediation: "Extract common logic into a shared function, class, or module"
  example_good: |
    def validate_email(email):
        return "@" in email and "." in email
    
    # Reuse in multiple places
    valid1 = validate_email(user1.email)
    valid2 = validate_email(user2.email)
  example_bad: |
    # File 1
    if "@" in user1.email and "." in user1.email:
        print("Valid")
    
    # File 2 - DUPLICATE!
    if "@" in user2.email and "." in user2.email:
        print("Valid")

DEAD-001:
  name: "Unused Code"
  category: "dead-code"
  severity: "low"
  description: "Function, class, or variable defined but never used"
  rationale: |
    Dead code increases maintenance burden, confuses developers,
    and may contain bugs that go unnoticed because the code never runs.
  remediation: "Remove unused code or document why it exists (if kept for future use)"
  example_good: |
    def calculate_total(items):
        return sum(items)
    
    # Function is actually called
    result = calculate_total([1, 2, 3])
  example_bad: |
    def calculate_total(items):
        return sum(items)
    
    def unused_function():  # Never called anywhere!
        pass

STYLE-001:
  name: "Line Too Long"
  category: "style"
  severity: "low"
  description: "Line exceeds maximum length (typically 88 or 120 characters)"
  rationale: |
    Long lines are hard to read, especially on smaller screens or in
    side-by-side diffs. Breaking lines improves readability.
  remediation: "Break line into multiple lines using parentheses or backslash"
  example_good: |
    result = some_function(
        argument1,
        argument2,
        argument3
    )
  example_bad: |
    result = some_function(argument1, argument2, argument3, argument4, argument5, argument6)

STYLE-002:
  name: "Missing Docstring"
  category: "style"
  severity: "low"
  description: "Public function or class lacks documentation"
  rationale: |
    Docstrings help others (and future you) understand what the code does,
    what parameters it expects, and what it returns.
  remediation: "Add a docstring explaining the function's purpose, parameters, and return value"
  example_good: |
    def calculate_total(items):
        """Calculate sum of all items.
        
        Args:
            items: List of numbers
            
        Returns:
            Sum of all items
        """
        return sum(items)
  example_bad: |
    def calculate_total(items):  # No docstring!
        return sum(items)

NAMING-001:
  name: "Bad Variable Name"
  category: "style"
  severity: "low"
  description: "Variable name is too short, unclear, or doesn't follow conventions"
  rationale: |
    Clear names make code self-documenting. Single-letter names (except
    in loops) or abbreviations force readers to guess the meaning.
  remediation: "Use descriptive names that explain what the variable represents"
  example_good: |
    customer_count = len(customers)
    total_price = calculate_total(items)
  example_bad: |
    c = len(customers)  # What is 'c'?
    tp = calculate_total(items)  # What is 'tp'?
COMPLEXITY-001:
  name: "High Cyclomatic Complexity"
  category: "design"
  severity: "medium"
  description: "Function has high cyclomatic complexity making it hard to test and maintain"
  rationale: |
    Cyclomatic complexity measures the number of independent paths through code.
    High complexity (>10) indicates too many branches (if/else/loops), making
    the function hard to understand, test, and maintain. Each additional path
    requires a new test case.
  remediation: "Refactor into smaller functions with single responsibilities"
  example_good: |
    def process_user(user):
        if not validate_user(user):
            return False
        if not check_permissions(user):
            return False
        return save_user(user)
  example_bad: |
    def process_user(user):
        if user.age < 18:
            if user.has_parent:
                if user.parent.verified:
                    # ... many more nested conditions
                    pass

# ===== NEW RULES (MEDIUM Priority - Expand Knowledge Base) =====

EXCEPT-001:
  name: "Bare Except Clause"
  category: "best-practice"
  severity: "medium"
  description: "Using bare 'except:' catches all exceptions including SystemExit and KeyboardInterrupt"
  rationale: |
    Bare except clauses catch ALL exceptions, including ones you probably don't want
    to catch like KeyboardInterrupt (Ctrl+C) and SystemExit. This can make debugging
    difficult and hide real errors.
  remediation: "Catch specific exceptions, or at minimum use 'except Exception:'"
  example_good: |
    try:
        result = risky_operation()
    except ValueError as e:
        logger.error(f"Invalid value: {e}")
    except Exception as e:
        logger.error(f"Unexpected error: {e}")
  example_bad: |
    try:
        result = risky_operation()
    except:  # BAD! Catches everything including Ctrl+C
        pass

HARDCODE-001:
  name: "Hardcoded Secret"
  category: "security"
  severity: "high"
  description: "Hardcoded password, API key, or secret in source code"
  rationale: |
    Hardcoded secrets in source code can be exposed through version control,
    code sharing, or decompilation. Once a secret is in git history, it's
    extremely difficult to fully remove. Attackers actively scan for such leaks.
  remediation: "Use environment variables or a secrets manager (e.g., AWS Secrets Manager, HashiCorp Vault)"
  example_good: |
    import os
    api_key = os.getenv('API_KEY')
    password = os.getenv('DB_PASSWORD')
  example_bad: |
    api_key = "sk-1234567890abcdef"  # EXPOSED!
    password = "admin123"  # EXPOSED!

ASYNC-001:
  name: "Async/Await Issue"
  category: "best-practice"
  severity: "medium"
  description: "Incorrect use of async/await patterns"
  rationale: |
    Async functions that don't await properly can lead to race conditions,
    unhandled promises, or blocking behavior. Missing await means the coroutine
    won't execute as expected.
  remediation: "Ensure all async calls are properly awaited or gathered"
  example_good: |
    async def fetch_data():
        result = await api_client.get('/data')
        return result
  example_bad: |
    async def fetch_data():
        result = api_client.get('/data')  # Missing await!
        return result

TYPE-001:
  name: "Type Annotation Issue"
  category: "style"
  severity: "low"
  description: "Missing or incorrect type annotations"
  rationale: |
    Type annotations improve code readability, enable better IDE support,
    and allow static type checkers like mypy to catch bugs before runtime.
  remediation: "Add type hints to function parameters and return values"
  example_good: |
    def greet(name: str) -> str:
        return f"Hello, {name}!"
  example_bad: |
    def greet(name):  # No type hints
        return f"Hello, {name}!"

# Security rules for Bandit integration
SECURITY-002:
  name: "Assert Used in Production"
  category: "security"
  severity: "low"
  description: "Assert statements are removed when Python runs with -O flag"
  rationale: |
    Assert statements are stripped out when Python runs in optimized mode (-O).
    Never use assert for security checks or input validation.
  remediation: "Use proper if/raise statements for validation"
  example_good: |
    if not user.is_authenticated:
        raise PermissionError("User not authenticated")
  example_bad: |
    assert user.is_authenticated  # Removed in production with -O!

SECURITY-005:
  name: "Hardcoded Password"
  category: "security"
  severity: "high"
  description: "Password or secret hardcoded in source code"
  rationale: |
    Hardcoded passwords can be extracted from source code or binaries.
    Use environment variables or secure secret management.
  remediation: "Use os.getenv() or a secrets manager"
  example_good: |
    password = os.getenv('DB_PASSWORD')
  example_bad: |
    password = "SuperSecret123"  # EXPOSED!

SECURITY-008:
  name: "Unsafe Pickle Usage"
  category: "security"
  severity: "high"
  description: "Pickle can execute arbitrary code during deserialization"
  rationale: |
    Pickle is not secure against maliciously crafted data. An attacker can
    craft a pickle that executes arbitrary code when unpickled.
  remediation: "Use JSON or other safe serialization formats for untrusted data"
  example_good: |
    import json
    data = json.loads(user_input)
  example_bad: |
    import pickle
    data = pickle.loads(user_input)  # DANGEROUS!

SECURITY-021:
  name: "Shell Injection Risk"
  category: "security"
  severity: "high"
  description: "Using shell=True in subprocess with user input"
  rationale: |
    shell=True passes the command through the shell, enabling command injection
    if any part of the command comes from user input.
  remediation: "Use shell=False and pass arguments as a list"
  example_good: |
    import subprocess
    subprocess.run(['ls', '-la', user_dir], shell=False)
  example_bad: |
    import subprocess
    subprocess.run(f"ls -la {user_dir}", shell=True)  # INJECTION RISK!

SECURITY-027:
  name: "SQL Injection Risk"
  category: "security"
  severity: "high"
  description: "Hardcoded SQL with string formatting vulnerable to injection"
  rationale: |
    String formatting in SQL queries allows attackers to inject malicious SQL.
    This can lead to data theft, modification, or complete database compromise.
  remediation: "Use parameterized queries with placeholders"
  example_good: |
    cursor.execute("SELECT * FROM users WHERE id = %s", (user_id,))
  example_bad: |
    cursor.execute(f"SELECT * FROM users WHERE id = {user_id}")  # INJECTION!

# ===== PERFORMANCE RULES =====

PERF-001:
  name: "Inefficient Loop"
  category: "performance"
  severity: "medium"
  description: "Loop performs unnecessary operations or repeated calculations"
  rationale: |
    Loops that recalculate invariant values or perform unnecessary operations
    waste CPU cycles. Moving invariant calculations outside loops improves performance.
  remediation: "Move invariant calculations outside the loop"
  example_good: |
    upper_limit = len(items)
    for i in range(upper_limit):
        process(items[i])
  example_bad: |
    for i in range(len(items)):  # len() called every iteration
        process(items[i])

PERF-002:
  name: "String Concatenation in Loop"
  category: "performance"
  severity: "medium"
  description: "Using + for string concatenation in loops is O(n²)"
  rationale: |
    Strings are immutable in Python. Using + in a loop creates a new string
    object each iteration, leading to O(n²) complexity. Use join() instead.
  remediation: "Use ''.join() or list comprehension"
  example_good: |
    result = ''.join(str(x) for x in items)
  example_bad: |
    result = ""
    for x in items:
        result += str(x)  # Creates new string each time!

# ===== DOCUMENTATION RULES =====

DOC-001:
  name: "Missing Docstring"
  category: "documentation"
  severity: "low"
  description: "Public function/class lacks docstring"
  rationale: |
    Docstrings are the primary way to document Python code. They enable
    auto-generated documentation and help other developers understand your code.
  remediation: "Add docstring with description, args, and returns"
  example_good: |
    def calculate_total(items: list) -> float:
        """Calculate total price of items.
        
        Args:
            items: List of item dictionaries with 'price' key
            
        Returns:
            Total price as float
        """
        return sum(item['price'] for item in items)
  example_bad: |
    def calculate_total(items):
        return sum(item['price'] for item in items)

DOC-002:
  name: "Outdated Comment"
  category: "documentation"
  severity: "low"
  description: "Comment contradicts the code"
  rationale: |
    Outdated comments are worse than no comments - they mislead developers
    and can cause bugs when code is modified based on incorrect documentation.
  remediation: "Update or remove outdated comments"
  example_good: |
    # Calculate average (mean)
    avg = sum(values) / len(values)
  example_bad: |
    # Calculate median
    avg = sum(values) / len(values)  # Actually calculates mean!

# ===== ERROR HANDLING RULES =====

ERROR-001:
  name: "Silent Exception"
  category: "best-practice"
  severity: "medium"
  description: "Exception caught but not logged or handled"
  rationale: |
    Silent exceptions hide errors, making debugging impossible. Always log
    exceptions or re-raise them after cleanup.
  remediation: "Log the exception or re-raise after cleanup"
  example_good: |
    try:
        risky_operation()
    except Exception as e:
        logger.error(f"Operation failed: {e}")
        cleanup()
        raise
  example_bad: |
    try:
        risky_operation()
    except Exception:
        pass  # Silent failure!

ERROR-002:
  name: "Catching Too Broad"
  category: "best-practice"
  severity: "low"
  description: "Catching Exception instead of specific exceptions"
  rationale: |
    Catching broad exceptions can hide unexpected errors. Catch specific
    exceptions you know how to handle.
  remediation: "Catch specific exception types"
  example_good: |
    try:
        value = int(user_input)
    except ValueError:
        print("Invalid number")
  example_bad: |
    try:
        value = int(user_input)
    except Exception:  # Too broad!
        print("Invalid number")

# ===== CONCURRENCY RULES =====

THREAD-001:
  name: "Race Condition"
  category: "concurrency"
  severity: "high"
  description: "Shared state accessed without synchronization"
  rationale: |
    Multiple threads accessing shared state without locks can cause race
    conditions, leading to data corruption and unpredictable behavior.
  remediation: "Use locks, queues, or thread-safe data structures"
  example_good: |
    from threading import Lock
    lock = Lock()
    
    def increment():
        with lock:
            global counter
            counter += 1
  example_bad: |
    def increment():
        global counter
        counter += 1  # Race condition!

# ===== LOGGING RULES =====

LOG-001:
  name: "Logging Sensitive Data"
  category: "security"
  severity: "high"
  description: "Logging passwords, tokens, or PII"
  rationale: |
    Logs are often stored insecurely and may be accessible to unauthorized
    parties. Never log sensitive data like passwords or API keys.
  remediation: "Redact sensitive data before logging"
  example_good: |
    logger.info(f"User {user_id} logged in")
  example_bad: |
    logger.info(f"User {username} logged in with password {password}")

# ===== RESOURCE MANAGEMENT =====

RESOURCE-001:
  name: "File Not Closed"
  category: "best-practice"
  severity: "medium"
  description: "File opened without using context manager"
  rationale: |
    Files not closed properly can lead to resource leaks, especially in
    long-running applications. Use 'with' statement for automatic cleanup.
  remediation: "Use 'with' statement for file operations"
  example_good: |
    with open('file.txt') as f:
        data = f.read()
  example_bad: |
    f = open('file.txt')
    data = f.read()
    # File might not be closed if exception occurs!

# ===== API DESIGN RULES =====

API-001:
  name: "Mutable Default Argument"
  category: "best-practice"
  severity: "medium"
  description: "Using mutable object as default argument"
  rationale: |
    Mutable default arguments are shared across all function calls, leading
    to unexpected behavior. Use None and create new object inside function.
  remediation: "Use None as default, create mutable inside function"
  example_good: |
    def add_item(item, items=None):
        if items is None:
            items = []
        items.append(item)
        return items
  example_bad: |
    def add_item(item, items=[]):  # Shared across calls!
        items.append(item)
        return items

INPUT-001:
  name: "Missing Input Validation"
  category: "security"
  severity: "high"
  description: "User input used without validation"
  rationale: |
    Unvalidated input can lead to injection attacks, crashes, or unexpected
    behavior. Always validate and sanitize user input.
  remediation: "Validate input type, range, and format"
  example_good: |
    def set_age(age):
        if not isinstance(age, int) or age < 0 or age > 150:
            raise ValueError("Invalid age")
        self.age = age
  example_bad: |
    def set_age(age):
        self.age = age  # No validation!


# ===== ADDITIONAL RULES (Phase 1 Complete) =====

COMPARE-001:
  name: "Improper None Comparison"
  category: "best-practice"
  severity: "low"
  description: "Using == instead of 'is' to compare with None"
  rationale: |
    In Python, None is a singleton. Using == compares values and may invoke
    __eq__, while 'is' compares identity directly. Always use 'is' for None.
  remediation: "Use 'if x is None' instead of 'if x == None'"
  example_good: |
    if x is None:
        handle_none()
  example_bad: |
    if x == None:  # Should use 'is'
        handle_none()

GLOBAL-001:
  name: "Global Variable Modification"
  category: "design"
  severity: "medium"
  description: "Modifying global variables inside functions"
  rationale: |
    Global variables create hidden dependencies and make testing difficult.
    Functions that modify globals have side effects that are hard to track.
  remediation: "Pass as parameter or use class attributes"
  example_good: |
    def increment(counter):
        return counter + 1
    count = increment(count)
  example_bad: |
    count = 0
    def increment():
        global count
        count += 1  # Hidden side effect!

MAGIC-001:
  name: "Magic Number"
  category: "style"
  severity: "low"
  description: "Hardcoded numeric literals without named constants"
  rationale: |
    Magic numbers make code hard to understand. Named constants explain
    the purpose and allow easy updates across the codebase.
  remediation: "Define constants with descriptive names"
  example_good: |
    MAX_RETRIES = 3
    TIMEOUT_SECONDS = 30
    for i in range(MAX_RETRIES):
        try_connection(timeout=TIMEOUT_SECONDS)
  example_bad: |
    for i in range(3):  # What is 3?
        try_connection(timeout=30)  # What is 30?

PATH-001:
  name: "Path Traversal Vulnerability"
  category: "security"
  severity: "high"
  description: "User input used directly in file paths without sanitization"
  rationale: |
    Attackers can use '../' sequences to access files outside the intended
    directory, potentially reading sensitive files or overwriting system files.
  remediation: "Use os.path.basename() or validate against allowed paths"
  example_good: |
    import os
    safe_name = os.path.basename(user_input)
    path = os.path.join('/uploads', safe_name)
  example_bad: |
    path = '/uploads/' + user_input  # User can input '../../../etc/passwd'

REGEX-001:
  name: "ReDoS Vulnerability"
  category: "security"
  severity: "medium"
  description: "Regular expression vulnerable to catastrophic backtracking"
  rationale: |
    Certain regex patterns can cause exponential time complexity with crafted
    input, allowing denial of service attacks. Avoid nested quantifiers.
  remediation: "Use atomic groups, possessive quantifiers, or rewrite pattern"
  example_good: |
    import re
    pattern = r'^[a-z]+$'  # Simple, linear time
  example_bad: |
    pattern = r'^(a+)+$'  # Nested quantifiers - exponential time!

RETURN-001:
  name: "Inconsistent Return Types"
  category: "best-practice"
  severity: "medium"
  description: "Function returns different types in different branches"
  rationale: |
    Inconsistent return types make code unpredictable and can cause runtime
    errors. Functions should return the same type consistently.
  remediation: "Return consistent types or use Optional[Type]"
  example_good: |
    def get_user(id: int) -> Optional[User]:
        if id in users:
            return users[id]
        return None  # Consistent with Optional
  example_bad: |
    def get_user(id):
        if id in users:
            return users[id]  # Returns User
        return "Not found"  # Returns string!

ASSERT-001:
  name: "Assert for Input Validation"
  category: "security"
  severity: "medium"
  description: "Using assert for input validation instead of proper checks"
  rationale: |
    Assert statements are removed with -O flag. Never use assert for
    input validation or security checks in production code.
  remediation: "Use if/raise for validation"
  example_good: |
    if not user.is_admin:
        raise PermissionError("Admin required")
  example_bad: |
    assert user.is_admin, "Admin required"  # Removed with -O!

PRINT-001:
  name: "Debug Print Statement"
  category: "style"
  severity: "low"
  description: "Print statements left in production code"
  rationale: |
    Print statements in production code clutter output and may expose
    sensitive information. Use proper logging instead.
  remediation: "Replace with logging.debug() or remove"
  example_good: |
    import logging
    logging.debug(f"Processing user {user_id}")
  example_bad: |
    print(f"DEBUG: user = {user}")  # Should use logging

# ─── Additional Security Rules (Bandit-mapped) ─────────────────────────

SECURITY-003:
  name: "Bad File Permissions"
  category: "security"
  severity: "high"
  description: "Setting overly permissive file permissions (e.g., 0o777)"
  rationale: |
    Overly permissive file permissions allow any user on the system to read,
    write, or execute the file. This can lead to unauthorized data access,
    code injection, or privilege escalation.
  remediation: "Use restrictive permissions: 0o600 for sensitive files, 0o644 for readable files"
  example_good: |
    os.chmod("config.ini", 0o600)  # Owner read/write only
  example_bad: |
    os.chmod("config.ini", 0o777)  # World-readable/writable!

SECURITY-004:
  name: "Hardcoded Bind All Interfaces"
  category: "security"
  severity: "medium"
  description: "Binding to 0.0.0.0 exposes the service to all network interfaces"
  rationale: |
    Binding to 0.0.0.0 makes the service accessible from any network interface,
    including public ones. In production, services should bind to specific
    interfaces (e.g., 127.0.0.1 for local-only or a private IP).
  remediation: "Bind to 127.0.0.1 for development or a specific interface for production"
  example_good: |
    app.run(host="127.0.0.1", port=8080)
  example_bad: |
    app.run(host="0.0.0.0", port=8080)  # Exposed to all interfaces

SECURITY-006:
  name: "Hardcoded Temporary Directory"
  category: "security"
  severity: "medium"
  description: "Using hardcoded /tmp paths instead of secure temp file creation"
  rationale: |
    Hardcoded /tmp paths are predictable and vulnerable to symlink attacks,
    race conditions, and information leakage. Other users on shared systems
    can monitor or manipulate these files.
  remediation: "Use tempfile.mkdtemp() or tempfile.NamedTemporaryFile() for secure temp files"
  example_good: |
    import tempfile
    with tempfile.NamedTemporaryFile(delete=False) as f:
        f.write(data)
  example_bad: |
    with open("/tmp/myapp_data.txt", "w") as f:
        f.write(sensitive_data)

SECURITY-007:
  name: "Try-Except-Pass"
  category: "security"
  severity: "medium"
  description: "Silently catching and ignoring exceptions hides errors and security issues"
  rationale: |
    Using try/except with pass or continue silently swallows errors, making
    debugging impossible and potentially hiding security-critical failures
    like authentication errors or permission denials.
  remediation: "Log the exception or handle it explicitly"
  example_good: |
    try:
        process_payment()
    except PaymentError as e:
        logging.error(f"Payment failed: {e}")
        raise
  example_bad: |
    try:
        process_payment()
    except Exception:
        pass  # Silently swallowed!

SECURITY-009:
  name: "Weak Hash Algorithm"
  category: "security"
  severity: "high"
  description: "Using MD5 or SHA1 for hashing — these are cryptographically broken"
  rationale: |
    MD5 and SHA1 have known collision vulnerabilities. Attackers can generate
    different inputs that produce the same hash, defeating integrity checks
    and password storage. NIST deprecated both for cryptographic use.
  remediation: "Use SHA-256 or SHA-3 for integrity checks, bcrypt/argon2 for passwords"
  example_good: |
    import hashlib
    digest = hashlib.sha256(data).hexdigest()
  example_bad: |
    import hashlib
    digest = hashlib.md5(data).hexdigest()  # Broken!

SECURITY-010:
  name: "Weak Cipher Algorithm"
  category: "security"
  severity: "high"
  description: "Using DES or other deprecated encryption ciphers"
  rationale: |
    DES has a 56-bit key length which can be brute-forced in hours.
    Other weak ciphers like RC4 and Blowfish have known vulnerabilities.
    Modern encryption requires AES-256 or ChaCha20.
  remediation: "Use AES-256-GCM or ChaCha20-Poly1305 for encryption"
  example_good: |
    from cryptography.fernet import Fernet
    cipher = Fernet(Fernet.generate_key())
  example_bad: |
    from Crypto.Cipher import DES  # 56-bit key, easily broken

SECURITY-011:
  name: "Insecure Temp File Creation"
  category: "security"
  severity: "high"
  description: "Using mktemp() which is vulnerable to race conditions"
  rationale: |
    os.tempnam() and tempfile.mktemp() create a filename but don't create
    the file atomically. An attacker can create the file between the name
    generation and the open() call (TOCTOU race condition).
  remediation: "Use tempfile.mkstemp() or tempfile.NamedTemporaryFile() instead"
  example_good: |
    import tempfile
    fd, path = tempfile.mkstemp()
  example_bad: |
    import tempfile
    path = tempfile.mktemp()  # Race condition!

SECURITY-012:
  name: "Django mark_safe Misuse"
  category: "security"
  severity: "high"
  description: "Using mark_safe() on user-controlled input enables XSS attacks"
  rationale: |
    Django's mark_safe() tells the template engine to render HTML without
    escaping. If used on user input, it enables Cross-Site Scripting (XSS)
    attacks where attackers inject malicious JavaScript.
  remediation: "Sanitize input before marking as safe, or use template autoescaping"
  example_good: |
    from django.utils.html import escape
    safe_content = mark_safe(escape(user_input))
  example_bad: |
    return mark_safe(user_input)  # XSS vulnerability!

SECURITY-013:
  name: "SSL Certificate Verification Disabled"
  category: "security"
  severity: "high"
  description: "Making HTTPS requests with verify=False disables certificate checking"
  rationale: |
    Disabling SSL certificate verification allows man-in-the-middle attacks.
    An attacker can intercept and modify traffic between your application
    and the server without detection.
  remediation: "Always verify certificates. Use verify=True (default) or specify a CA bundle"
  example_good: |
    requests.get("https://api.example.com", verify=True)
  example_bad: |
    requests.get("https://api.example.com", verify=False)  # MITM risk!

SECURITY-014:
  name: "Insecure SSL Version"
  category: "security"
  severity: "high"
  description: "Using deprecated SSL/TLS versions (SSLv2, SSLv3, TLSv1.0)"
  rationale: |
    SSLv2, SSLv3, and TLSv1.0 have known vulnerabilities (POODLE, BEAST).
    Modern security requires TLS 1.2 or 1.3 minimum. PCI-DSS compliance
    mandates TLS 1.2+.
  remediation: "Use ssl.PROTOCOL_TLS_CLIENT or specify minimum version TLS 1.2"
  example_good: |
    context = ssl.SSLContext(ssl.PROTOCOL_TLS_CLIENT)
    context.minimum_version = ssl.TLSVersion.TLSv1_2
  example_bad: |
    context = ssl.SSLContext(ssl.PROTOCOL_SSLv3)  # Vulnerable!

SECURITY-015:
  name: "Insecure SSL Defaults"
  category: "security"
  severity: "medium"
  description: "SSL context created with insecure default settings"
  rationale: |
    Default SSL context settings may allow weak ciphers or protocols.
    Explicitly configuring security parameters ensures only strong
    ciphers and protocols are used.
  remediation: "Create SSL context with explicit security parameters"
  example_good: |
    context = ssl.create_default_context()
    context.set_ciphers("ECDHE+AESGCM")
  example_bad: |
    context = ssl.SSLContext()  # Insecure defaults

SECURITY-016:
  name: "SSL Context Without Version"
  category: "security"
  severity: "medium"
  description: "SSL context created without specifying protocol version"
  rationale: |
    Without explicit version specification, the SSL context may negotiate
    deprecated protocol versions vulnerable to known attacks.
  remediation: "Specify minimum TLS version when creating SSL context"
  example_good: |
    context = ssl.SSLContext(ssl.PROTOCOL_TLS_CLIENT)
  example_bad: |
    context = ssl.SSLContext()  # No version specified

SECURITY-017:
  name: "Weak Cryptographic Key"
  category: "security"
  severity: "high"
  description: "RSA key shorter than 2048 bits or DSA key shorter than 2048 bits"
  rationale: |
    Short cryptographic keys can be factored or brute-forced with modern
    hardware. NIST recommends minimum 2048-bit RSA keys and 256-bit ECC keys.
    Keys shorter than this are considered insecure.
  remediation: "Use RSA 2048+ bits or ECC 256+ bits"
  example_good: |
    from cryptography.hazmat.primitives.asymmetric import rsa
    key = rsa.generate_private_key(public_exponent=65537, key_size=4096)
  example_bad: |
    key = rsa.generate_private_key(public_exponent=65537, key_size=1024)  # Too short!

SECURITY-018:
  name: "Unsafe YAML Load"
  category: "security"
  severity: "high"
  description: "Using yaml.load() without SafeLoader enables arbitrary code execution"
  rationale: |
    yaml.load() with the default Loader can deserialize arbitrary Python
    objects, enabling Remote Code Execution (RCE). An attacker can craft
    a YAML file that executes arbitrary commands when loaded.
  remediation: "Use yaml.safe_load() instead of yaml.load()"
  example_good: |
    import yaml
    data = yaml.safe_load(open("config.yml"))
  example_bad: |
    import yaml
    data = yaml.load(open("config.yml"))  # RCE vulnerability!

SECURITY-019:
  name: "SSH No Host Key Verification"
  category: "security"
  severity: "high"
  description: "SSH connections without host key verification are vulnerable to MITM"
  rationale: |
    Disabling host key verification in SSH (AutoAddPolicy) allows
    man-in-the-middle attacks. An attacker can impersonate the server
    and intercept credentials and data.
  remediation: "Use RejectPolicy or load known host keys"
  example_good: |
    client = paramiko.SSHClient()
    client.load_system_host_keys()
  example_bad: |
    client = paramiko.SSHClient()
    client.set_missing_host_key_policy(paramiko.AutoAddPolicy())  # MITM risk!

SECURITY-020:
  name: "Paramiko Exec Command"
  category: "security"
  severity: "medium"
  description: "Remote command execution via Paramiko without input sanitization"
  rationale: |
    Executing commands over SSH with user-controlled input can lead to
    command injection on remote systems. Always validate and sanitize
    commands before execution.
  remediation: "Sanitize inputs and use allowlists for permitted commands"
  example_good: |
    allowed_commands = {"ls", "df", "uptime"}
    if cmd in allowed_commands:
        client.exec_command(cmd)
  example_bad: |
    client.exec_command(user_input)  # Command injection!

SECURITY-022:
  name: "Subprocess Without Shell"
  category: "security"
  severity: "low"
  description: "Subprocess call without shell=True (informational)"
  rationale: |
    While subprocess calls without shell=True are generally safer, they
    still require input validation to prevent argument injection attacks.
  remediation: "Validate all inputs passed to subprocess calls"
  example_good: |
    subprocess.run(["git", "status"], check=True)
  example_bad: |
    subprocess.run([user_command, user_arg])  # Validate inputs

SECURITY-023:
  name: "Function Call With Shell"
  category: "security"
  severity: "high"
  description: "Calling system functions with shell=True and user input"
  rationale: |
    Functions like os.popen(), popen2, or subprocess with shell=True
    interpret the command string through the shell, enabling injection
    of additional commands via metacharacters (; | && etc).
  remediation: "Use subprocess.run() with a list of arguments and shell=False"
  example_good: |
    subprocess.run(["ls", "-la", directory], shell=False)
  example_bad: |
    os.popen(f"ls -la {user_input}")  # Shell injection!

SECURITY-024:
  name: "Start Process With Shell"
  category: "security"
  severity: "high"
  description: "Starting a process using a shell command string"
  rationale: |
    Using os.system() or similar functions passes commands through the
    system shell, enabling command injection if input is not sanitized.
  remediation: "Use subprocess.run() with argument lists instead"
  example_good: |
    subprocess.run(["ping", "-c", "3", hostname], check=True)
  example_bad: |
    os.system(f"ping -c 3 {hostname}")  # Command injection risk

SECURITY-025:
  name: "Start Process Without Shell Validation"
  category: "security"
  severity: "low"
  description: "Starting a process without input validation (informational)"
  rationale: |
    Even without shell=True, subprocess calls with unvalidated user input
    can lead to unexpected behavior or argument injection.
  remediation: "Validate and sanitize all process arguments"
  example_good: |
    if filename.isalnum():
        subprocess.run(["cat", filename])
  example_bad: |
    subprocess.run(["cat", user_filename])  # Validate first

SECURITY-026:
  name: "Start Process With Partial Path"
  category: "security"
  severity: "medium"
  description: "Using a partial executable path in subprocess calls"
  rationale: |
    Using partial paths (e.g., 'python' instead of '/usr/bin/python')
    relies on PATH resolution, which can be manipulated by an attacker
    to execute a malicious binary instead.
  remediation: "Use absolute paths for executables in subprocess calls"
  example_good: |
    subprocess.run(["/usr/bin/python3", "script.py"])
  example_bad: |
    subprocess.run(["python3", "script.py"])  # PATH manipulation risk

SECURITY-028:
  name: "Wildcard Injection in Linux Commands"
  category: "security"
  severity: "high"
  description: "Using wildcards in shell commands that can be exploited for injection"
  rationale: |
    Shell wildcards (*) in commands like tar, rsync, or find can be
    exploited through specially named files. For example, a file named
    '--checkpoint-action=exec=malicious.sh' will be interpreted as a
    tar flag, not a filename.
  remediation: "Use -- to separate flags from filenames, or use glob.glob() in Python"
  example_good: |
    import glob
    files = glob.glob("*.txt")
    subprocess.run(["tar", "cf", "backup.tar", "--"] + files)
  example_bad: |
    os.system("tar cf backup.tar *.txt")  # Wildcard injection!

SECURITY-029:
  name: "Django extra() SQL Injection"
  category: "security"
  severity: "high"
  description: "Using Django ORM extra() method with unescaped user input"
  rationale: |
    Django's extra() method allows raw SQL fragments which bypass the
    ORM's SQL injection protections. User input in extra() can lead to
    SQL injection attacks.
  remediation: "Use Django ORM methods (filter, annotate) or parameterized queries"
  example_good: |
    User.objects.filter(name=user_input)
  example_bad: |
    User.objects.extra(where=[f"name = '{user_input}'"])  # SQL injection!

SECURITY-030:
  name: "Django RawSQL Usage"
  category: "security"
  severity: "high"
  description: "Using Django RawSQL with unparameterized user input"
  rationale: |
    Django's RawSQL allows arbitrary SQL execution. Without proper
    parameterization, user input can be injected into queries,
    leading to data theft or database manipulation.
  remediation: "Use parameterized queries with %s placeholders"
  example_good: |
    from django.db.models.expressions import RawSQL
    qs = Model.objects.annotate(val=RawSQL("select col from tbl where id = %s", [param]))
  example_bad: |
    qs = Model.objects.annotate(val=RawSQL(f"select col from tbl where id = {user_id}", []))

SECURITY-031:
  name: "Jinja2 Autoescape Disabled"
  category: "security"
  severity: "high"
  description: "Jinja2 template engine with autoescaping disabled enables XSS"
  rationale: |
    Jinja2 autoescaping prevents Cross-Site Scripting (XSS) by escaping
    HTML special characters in template variables. Disabling it allows
    attackers to inject malicious scripts through user-controlled data.
  remediation: "Set autoescape=True in Jinja2 Environment"
  example_good: |
    env = jinja2.Environment(autoescape=True, loader=loader)
  example_bad: |
    env = jinja2.Environment(autoescape=False, loader=loader)  # XSS!

SECURITY-032:
  name: "Mako Template Usage"
  category: "security"
  severity: "medium"
  description: "Mako templates do not auto-escape by default, enabling XSS"
  rationale: |
    Unlike Jinja2, Mako templates do not escape HTML output by default.
    User-controlled data rendered through Mako can contain malicious
    scripts that execute in the victim's browser.
  remediation: "Use Jinja2 with autoescaping, or configure Mako's default_filters"
  example_good: |
    from mako.template import Template
    t = Template(text, default_filters=["h"])  # HTML escape
  example_bad: |
    from mako.template import Template
    t = Template("Hello ${user_input}")  # No escaping!

SECURITY-033:
  name: "Django mark_safe on Sensitive Data"
  category: "security"
  severity: "high"
  description: "Using django.utils.safestring.mark_safe on potentially unsafe content"
  rationale: |
    mark_safe() bypasses Django's template autoescaping. Using it on
    user-controlled data or data from external sources creates XSS
    vulnerabilities. Only use on content you fully control and trust.
  remediation: "Use format_html() for safe HTML construction with escaping"
  example_good: |
    from django.utils.html import format_html
    output = format_html("<b>{}</b>", user_name)
  example_bad: |
    from django.utils.safestring import mark_safe
    output = mark_safe(f"<b>{user_name}</b>")  # XSS if user_name has HTML


SECURITY-045:
  name: "XSS via Flask render_template_string"
  category: "security"
  severity: "high"
  description: "render_template_string() with user-controlled input enables XSS attacks"
  rationale: |
    Unlike render_template() which loads from disk, render_template_string()
    executes template strings at runtime. When user input reaches this function,
    an attacker can inject Jinja2 template syntax or HTML/JS for XSS.
    This bypasses CSRF protections and can steal session cookies.
  remediation: "Use render_template() with validated templates, or sanitize and escape all user input before passing to render_template_string()"
  example_good: |
    from flask import render_template
    return render_template("user_page.html", name=username)
  example_bad: |
    from flask import render_template_string, request
    template = request.args.get("template", "")
    return render_template_string(template)  # XSS/SSTI!

SECURITY-046:
  name: "SSRF via Requests with User-Controlled URL"
  category: "security"
  severity: "high"
  description: "requests.get/post with user-controlled URL enables Server-Side Request Forgery (SSRF)"
  rationale: |
    SSRF allows attackers to make the server fetch internal resources.
    With cloud providers, this can leak instance metadata including credentials
    (e.g., http://169.254.169.254/ on AWS, http://metadata.google.internal/).
    OWASP Top 10 2021: A10 — SSRF.
  remediation: "Validate URLs against an allowlist of permitted domains/protocols; use a DNS-based SSRF blocker"
  example_good: |
    ALLOWED_DOMAINS = {"api.example.com", "cdn.example.com"}
    from urllib.parse import urlparse
    if urlparse(url).netloc not in ALLOWED_DOMAINS:
        raise ValueError("Domain not allowed")
    response = requests.get(url)
  example_bad: |
    url = request.args.get("url")
    response = requests.get(url)  # SSRF! Can access internal services

SECURITY-047:
  name: "JWT None Algorithm Bypass"
  category: "security"
  severity: "critical"
  description: "JWT decoded with 'none' algorithm allows complete signature bypass"
  rationale: |
    The JWT 'none' algorithm disables signature verification entirely. An attacker
    can create a token with any claims (e.g., admin: true) by using algorithm='none'
    and omitting the signature. This is a well-known vulnerability (CVE-2015-9235).
    Never allow 'none' in your algorithms list.
  remediation: "Whitelist only specific algorithms: algorithms=['HS256'] or ['RS256']. Never include 'none'."
  example_good: |
    payload = jwt.decode(token, SECRET_KEY, algorithms=["HS256"])
  example_bad: |
    payload = jwt.decode(token, "", algorithms=["none"])  # No verification!

SECURITY-048:
  name: "Open Redirect Vulnerability"
  category: "security"
  severity: "medium"
  description: "redirect() with user-controlled destination enables open redirect attacks"
  rationale: |
    Open redirects allow attackers to craft URLs that appear to come from your
    domain but redirect users to malicious sites. Used in phishing campaigns,
    OAuth flow hijacking, and credential harvesting. CWE-601.
  remediation: "Validate redirect URLs against an allowlist; use url_for() for internal redirects"
  example_good: |
    next_url = request.args.get("next", "/")
    if not urlparse(next_url).netloc:  # Only allow relative URLs
        return redirect(next_url)
    return redirect("/")
  example_bad: |
    next_url = request.args.get("next")
    return redirect(next_url)  # Attacker sets next=https://evil.com

